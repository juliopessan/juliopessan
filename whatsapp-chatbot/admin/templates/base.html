<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin{% endblock %} — WhatsApp Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --primary: #25d366;
      --primary-dark: #1aab51;
      --danger: #e55353;
      --warning: #f5a623;
      --text: #e8eaf0;
      --text-muted: #8b90a8;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: var(--primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Sidebar */
    .layout { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
    }

    .sidebar-brand {
      padding: 20px 18px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-brand h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-brand .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .sidebar-nav { padding: 12px 0; flex: 1; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      border-left: 3px solid transparent;
    }

    .nav-item:hover { color: var(--text); background: var(--surface2); text-decoration: none; }
    .nav-item.active { color: var(--primary); border-left-color: var(--primary); background: rgba(37,211,102,.08); }

    .sidebar-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
    }

    .sidebar-footer a {
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sidebar-footer a:hover { color: var(--danger); }

    /* Main */
    .main { margin-left: 220px; flex: 1; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .topbar h2 { font-size: 16px; font-weight: 600; }

    .content { padding: 28px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 16px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .stat-value { font-size: 28px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); padding: 10px 14px; border-bottom: 1px solid var(--border); }
    td { padding: 13px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .badge-green { background: rgba(37,211,102,.15); color: var(--primary); }
    .badge-red   { background: rgba(229,83,83,.15);  color: var(--danger); }
    .badge-gray  { background: rgba(139,144,168,.12); color: var(--text-muted); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      text-decoration: none;
    }

    .btn-primary { background: var(--primary); color: #000; }
    .btn-primary:hover { background: var(--primary-dark); text-decoration: none; color: #000; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--border); text-decoration: none; }
    .btn-danger { background: rgba(229,83,83,.15); color: var(--danger); border: 1px solid rgba(229,83,83,.3); }
    .btn-danger:hover { background: rgba(229,83,83,.25); text-decoration: none; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* Forms */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid.full { grid-template-columns: 1fr; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.span2 { grid-column: span 2; }

    label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="number"],
    input[type="time"],
    select,
    textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 9px 12px;
      font-size: 13px;
      width: 100%;
      outline: none;
      transition: border .15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: var(--surface2); }

    .form-actions { display: flex; gap: 10px; align-items: center; margin-top: 8px; }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 7px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .alert-error   { background: rgba(229,83,83,.12);  border: 1px solid rgba(229,83,83,.3);  color: #f08080; }
    .alert-success { background: rgba(37,211,102,.10); border: 1px solid rgba(37,211,102,.3); color: var(--primary); }

    /* FAQ list */
    .faq-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .faq-item .faq-text { flex: 1; }
    .faq-item .faq-q { font-weight: 600; margin-bottom: 4px; font-size: 13px; }
    .faq-item .faq-a { color: var(--text-muted); font-size: 12px; }

    /* Hours grid */
    .hours-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .hours-row { display: flex; flex-direction: column; gap: 6px; }
    .hours-row label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
    .hours-inputs { display: flex; gap: 6px; align-items: center; }
    .hours-inputs input { flex: 1; }
    .hours-inputs span { color: var(--text-muted); font-size: 12px; }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 10px; }
    .toggle { position: relative; width: 42px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: .2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--primary); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 22px; }
    .tab {
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
    }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Misc */
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .text-muted { color: var(--text-muted); }
    .mt-16 { margin-top: 16px; }
    .flex { display: flex; }
    .gap-8 { gap: 8px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }

    /* Login page */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .login-logo { text-align: center; margin-bottom: 28px; }
    .login-logo .icon { font-size: 42px; }
    .login-logo h1 { font-size: 20px; font-weight: 700; margin-top: 10px; }
    .login-logo p { color: var(--text-muted); font-size: 13px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .form-grid { grid-template-columns: 1fr; }
      .form-group.span2 { grid-column: span 1; }
      .hours-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
{% block body %}
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>💬 ChatBot</h1>
      <div class="subtitle">Painel Admin</div>
    </div>
    <nav class="sidebar-nav">
      <a href="/admin" class="nav-item {% if active == 'dashboard' %}active{% endif %}">
        📊 Dashboard
      </a>
      <a href="/admin/companies" class="nav-item {% if active == 'companies' %}active{% endif %}">
        🏢 Empresas
      </a>
      <a href="/admin/companies/new" class="nav-item {% if active == 'new' %}active{% endif %}">
        ➕ Nova Empresa
      </a>
    </nav>
    <div class="sidebar-footer">
      <a href="/admin/logout">🚪 Sair</a>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h2>{% block page_title %}{% endblock %}</h2>
      <div>{% block topbar_actions %}{% endblock %}</div>
    </div>
    <div class="content">
      {% with messages = get_flashed_messages() %}{% endwith %}
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
{% endblock %}

<script>
  // Tabs
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      const group = tab.closest(".tabs").dataset.group;
      document.querySelectorAll(`.tab[data-group="${group}"], .tab-content[data-group="${group}"]`).forEach(el => el.classList.remove("active"));
      tab.classList.add("active");
      document.querySelector(`.tab-content[data-target="${tab.dataset.target}"]`).classList.add("active");
    });
  });

  // Confirm delete
  document.querySelectorAll("[data-confirm]").forEach(btn => {
    btn.addEventListener("click", e => {
      if (!confirm(btn.dataset.confirm)) e.preventDefault();
    });
  });
</script>
</body>
</html>
